<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
@page { size: A4; margin: 0; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 12px;
  color: #222;
  background: #fff;
  line-height: 1.55;
}
.page { max-width: 700px; margin: 0 auto; padding: 40px 44px; }
.header { margin-bottom: 18px; }
.header h1 {
  font-size: 26px;
  font-weight: 700;
  color: #111;
  letter-spacing: 0.5px;
  margin-bottom: 2px;
}
.header .headline { font-size: 13px; color: #666; font-weight: 400; }
.header .contact {
  font-size: 11px;
  color: #999;
  margin-top: 6px;
  border-top: 1px solid #eee;
  padding-top: 6px;
}
.header .contact a { color: #444; text-decoration: none; }
.section { margin-bottom: 16px; }
.section-title {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 3px;
  color: #888;
  margin-bottom: 8px;
  padding-bottom: 3px;
}
.divider { width: 30px; height: 2px; background: #ddd; margin-bottom: 10px; }
.entry { margin-bottom: 12px; }
.entry-head { display: flex; justify-content: space-between; align-items: baseline; }
.entry-title { font-weight: 600; font-size: 13px; color: #111; }
.entry-date { font-size: 10px; color: #aaa; white-space: nowrap; letter-spacing: 0.5px; text-transform: uppercase; }
.entry-sub { font-size: 12px; color: #666; }
.entry-desc { font-size: 11.5px; color: #555; margin-top: 3px; line-height: 17px; }
ul.bullets { margin: 4px 0 0 14px; }
ul.bullets li { font-size: 11px; color: #555; margin-bottom: 2px; line-height: 16px; }
.chip {
  display: inline-block;
  background: #f5f5f5;
  color: #333;
  padding: 2px 8px;
  border-radius: 2px;
  font-size: 10px;
  margin: 2px 2px;
  font-weight: 500;
}
.skill-group { margin-bottom: 4px; }
.skill-label { font-weight: 600; font-size: 11px; color: #444; }
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <h1>{{NAME}}</h1>
    <div class="headline">{{HEADLINE}}</div>
    <div class="contact">{{CONTACT_LINE}}</div>
  </div>

  {{SUMMARY_SECTION}}
  {{EXPERIENCE_SECTION}}
  {{PROJECTS_SECTION}}
  {{EDUCATION_SECTION}}
  {{SKILLS_SECTION}}
  {{CERTIFICATIONS_SECTION}}
  {{ACHIEVEMENTS_SECTION}}
</div>
</body>
</html>
