<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href='https://fonts.googleapis.com/css?family=Lato:400,300,700' rel='stylesheet' type='text/css'>
<style>
@page { size: A4; margin: 0; }
* { margin: 0; padding: 0; box-sizing: border-box; }
html { height: 100%; }
body {
  min-height: 100%;
  background: #fff;
  font-family: 'Lato', sans-serif;
  font-weight: 400;
  color: #222;
  font-size: 13px;
  line-height: 24px;
}
.container {
  max-width: 700px;
  background: #fff;
  margin: 0 auto;
  padding: 36px 40px;
}

/* ─── Header ─── */
.header { margin-bottom: 22px; text-align: center; }
.full-name {
  font-size: 34px;
  text-transform: uppercase;
  margin-bottom: 4px;
  letter-spacing: 2px;
}
.first-name { font-weight: 700; }
.last-name { font-weight: 300; }
.contact-info {
  margin-bottom: 12px;
  font-size: 11px;
  color: #666;
}
.contact-info a { color: #3a7bd5; text-decoration: none; }
.separator {
  height: 10px;
  display: inline-block;
  border-left: 1.5px solid #bbb;
  margin: 0 10px;
}
.about {
  text-align: left;
  padding-top: 12px;
  border-top: 2px solid #3a7bd5;
}
.position {
  font-weight: 700;
  display: inline-block;
  margin-right: 8px;
  color: #3a7bd5;
  font-size: 14px;
}
.about .desc {
  font-size: 12px;
  line-height: 19px;
  color: #555;
}

/* ─── Sections ─── */
.details { line-height: 20px; }
.section { margin-bottom: 22px; }
.section:last-of-type { margin-bottom: 0; }
.section__title {
  letter-spacing: 2px;
  color: #3a7bd5;
  font-weight: 700;
  margin-bottom: 8px;
  text-transform: uppercase;
  font-size: 13px;
  border-bottom: 1.5px solid #e0e8f0;
  padding-bottom: 4px;
}

/* ─── List Items ─── */
.section__list-item { margin-bottom: 14px; }
.section__list-item:last-of-type { margin-bottom: 0; }
.left, .right { vertical-align: top; display: inline-block; }
.left { width: 58%; }
.right { width: 39%; text-align: right; }
.name { font-weight: 700; font-size: 13px; color: #222; }
.addr { color: #888; font-size: 11px; }
.duration { color: #888; font-size: 11px; }
.desc { font-size: 12px; color: #555; line-height: 18px; }
.text { font-size: 12px; color: #555; line-height: 18px; }

/* ─── Links ─── */
a { text-decoration: none; color: #3a7bd5; }
a:hover { text-decoration: underline; }

/* ─── Skills ─── */
.skills__item { margin-bottom: 6px; overflow: hidden; }
.skills__item .left { width: 28%; }
.skills__item .right { width: 70%; text-align: left; }
.skill-bar-bg {
  display: inline-block;
  width: 100px;
  height: 6px;
  background: #e8eef5;
  border-radius: 3px;
  margin-right: 8px;
  vertical-align: middle;
}
.skill-bar {
  height: 100%;
  background: linear-gradient(90deg, #3a7bd5, #00d2ff);
  border-radius: 3px;
}

/* ─── Chips ─── */
.chip {
  display: inline-block;
  background: #edf2fc;
  color: #3a7bd5;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 10px;
  margin: 2px 3px;
  font-weight: 600;
  border: 1px solid #d4deef;
}

/* ─── Lists ─── */
ul { margin: 4px 0 0 16px; }
li { font-size: 12px; color: #444; margin-bottom: 3px; line-height: 17px; }
.links { font-size: 11px; color: #888; }
.links a { color: #3a7bd5; font-style: normal; font-size: 11px; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="full-name">
      <span class="first-name">{{FIRST_NAME}}</span>
      <span class="last-name">{{LAST_NAME}}</span>
    </div>
    <div class="contact-info">
      {{CONTACT_LINE}}
    </div>
    <div class="about">
      <span class="position">{{HEADLINE}}</span>
      <span class="desc">{{SUMMARY}}</span>
    </div>
  </div>
  <div class="details">
    {{EXPERIENCE_SECTION}}
    {{EDUCATION_SECTION}}
    {{PROJECTS_SECTION}}
    {{SKILLS_SECTION}}
    {{CERTIFICATIONS_SECTION}}
    {{ACHIEVEMENTS_SECTION}}
  </div>
</div>
</body>
</html>
