<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href='https://fonts.googleapis.com/css?family=Lato:400,300,700' rel='stylesheet' type='text/css'>
<style>
@page { size: A4; margin: 0; }
* { margin: 0; padding: 0; box-sizing: border-box; }
html { height: 100%; }
body {
  min-height: 100%;
  background: #fff;
  font-family: 'Lato', sans-serif;
  font-weight: 400;
  color: #222;
  font-size: 13px;
  line-height: 22px;
}
.container {
  max-width: 700px;
  background: #fff;
  margin: 0 auto;
  padding: 40px;
}
.header { margin-bottom: 24px; }
.full-name {
  font-size: 36px;
  text-transform: uppercase;
  margin-bottom: 4px;
}
.first-name { font-weight: 700; }
.last-name { font-weight: 300; }
.contact-info { margin-bottom: 14px; font-size: 12px; }
.email, .phone { color: #999; font-weight: 300; }
.separator {
  height: 10px;
  display: inline-block;
  border-left: 2px solid #999;
  margin: 0 10px;
}
.position {
  font-weight: bold;
  display: inline-block;
  margin-right: 10px;
  text-decoration: underline;
}
.about .desc { font-size: 13px; line-height: 20px; color: #444; }
.details { line-height: 20px; }
.section { margin-bottom: 28px; }
.section:last-of-type { margin-bottom: 0; }
.section__title {
  letter-spacing: 2px;
  color: #54AFE4;
  font-weight: bold;
  margin-bottom: 10px;
  text-transform: uppercase;
  font-size: 14px;
  border-bottom: 1px solid #eee;
  padding-bottom: 4px;
}
.section__list-item { margin-bottom: 18px; }
.section__list-item:last-of-type { margin-bottom: 0; }
.left, .right { vertical-align: top; display: inline-block; }
.left { width: 58%; }
.right { width: 39%; text-align: right; }
.name { font-weight: bold; font-size: 13px; }
.addr { color: #888; font-size: 11px; }
.duration { color: #888; font-size: 11px; }
.desc { font-size: 12px; color: #555; line-height: 18px; }
.text { font-size: 12px; color: #555; line-height: 18px; }
a { text-decoration: none; color: #54AFE4; font-style: italic; }
a:hover { text-decoration: underline; }
.skills__item { margin-bottom: 6px; overflow: hidden; }
.skills__item .left { width: 30%; }
.skills__item .right { width: 68%; text-align: left; }
.skill-dot {
  display: inline-block;
  width: 16px; height: 16px;
  background: #C3DEF3;
  border-radius: 50%;
  margin-right: 3px;
}
.skill-dot.filled { background: #54AFE4; }
.chip {
  display: inline-block;
  background: #E8F4FD;
  color: #2980b9;
  padding: 2px 8px;
  border-radius: 3px;
  font-size: 11px;
  margin: 2px 3px;
  font-weight: 500;
}
.links { font-size: 11px; color: #888; }
.links a { color: #54AFE4; font-style: normal; font-size: 11px; }
ul { margin: 4px 0 0 16px; }
li { font-size: 12px; color: #444; margin-bottom: 3px; line-height: 17px; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="full-name">
      <span class="first-name">{{FIRST_NAME}}</span>
      <span class="last-name">{{LAST_NAME}}</span>
    </div>
    <div class="contact-info">
      {{CONTACT_LINE}}
    </div>
    <div class="about">
      <span class="position">{{HEADLINE}}</span>
      <span class="desc">{{SUMMARY}}</span>
    </div>
  </div>
  <div class="details">
    {{EXPERIENCE_SECTION}}
    {{EDUCATION_SECTION}}
    {{PROJECTS_SECTION}}
    {{SKILLS_SECTION}}
    {{CERTIFICATIONS_SECTION}}
    {{ACHIEVEMENTS_SECTION}}
  </div>
</div>
</body>
</html>
