<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
@page { size: A4; margin: 0; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Inter', sans-serif;
  font-size: 12px;
  color: #2c2c2c;
  background: #fff;
  line-height: 1.5;
}
.page { max-width: 700px; margin: 0 auto; padding: 40px 48px; }
.header { text-align: center; margin-bottom: 20px; border-bottom: 2px solid #1a365d; padding-bottom: 16px; }
.header h1 {
  font-family: 'Libre Baskerville', serif;
  font-size: 28px;
  font-weight: 700;
  color: #1a365d;
  letter-spacing: 2px;
  margin-bottom: 4px;
}
.header .headline {
  font-size: 13px;
  color: #555;
  font-style: italic;
  margin-bottom: 6px;
}
.header .contact {
  font-size: 11px;
  color: #777;
}
.header .contact a { color: #1a365d; text-decoration: none; }
.section { margin-bottom: 18px; }
.section-title {
  font-family: 'Libre Baskerville', serif;
  font-size: 13px;
  font-weight: 700;
  color: #1a365d;
  text-transform: uppercase;
  letter-spacing: 2px;
  border-bottom: 1px solid #cbd5e0;
  padding-bottom: 3px;
  margin-bottom: 10px;
}
.entry { margin-bottom: 12px; }
.entry-head { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 2px; }
.entry-title { font-weight: 600; font-size: 13px; color: #1a365d; }
.entry-date { font-size: 11px; color: #999; white-space: nowrap; }
.entry-sub { font-size: 12px; color: #555; font-style: italic; }
.entry-desc { font-size: 12px; color: #444; margin-top: 3px; line-height: 18px; }
ul.bullets { margin: 4px 0 0 16px; }
ul.bullets li { font-size: 11.5px; color: #444; margin-bottom: 2px; line-height: 17px; }
.chip {
  display: inline-block;
  background: #ebf4ff;
  color: #1a365d;
  padding: 2px 8px;
  border-radius: 3px;
  font-size: 10px;
  margin: 2px 3px;
  font-weight: 600;
}
.skill-group { margin-bottom: 4px; }
.skill-label { font-weight: 600; font-size: 11px; color: #1a365d; }
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <h1>{{NAME}}</h1>
    <div class="headline">{{HEADLINE}}</div>
    <div class="contact">{{CONTACT_LINE}}</div>
  </div>

  {{SUMMARY_SECTION}}
  {{EDUCATION_SECTION}}
  {{EXPERIENCE_SECTION}}
  {{PROJECTS_SECTION}}
  {{SKILLS_SECTION}}
  {{CERTIFICATIONS_SECTION}}
  {{ACHIEVEMENTS_SECTION}}
</div>
</body>
</html>
