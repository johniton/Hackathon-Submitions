<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resume</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@300;400;500;600;700&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Inter', Arial, sans-serif; font-size: 10pt; color: #e0e0e0; background: #0a0a0a; padding: 0; }
  .page { width: 210mm; min-height: 297mm; padding: 0; display: flex; }

  .sidebar { width: 58mm; background: #111827; border-left: 3px solid #00d4ff; padding: 15mm 9mm; flex-shrink: 0; }
  .main { flex: 1; background: #0f0f14; padding: 12mm 12mm 12mm 10mm; }

  /* Sidebar */
  .side-name { font-family: 'JetBrains Mono', monospace; font-size: 16pt; font-weight: 600; color: #00d4ff; margin-bottom: 1mm; line-height: 1.3; }
  .side-headline { font-size: 8pt; color: #64748b; font-family: 'JetBrains Mono', monospace; margin-bottom: 6mm; line-height: 1.5; }

  .side-section-title { font-family: 'JetBrains Mono', monospace; font-size: 7pt; text-transform: uppercase; letter-spacing: 2px; color: #00d4ff; font-weight: 600; margin: 5mm 0 2mm; padding-bottom: 1mm; border-bottom: 0.3mm solid #1e3a4d; }

  .side-contact-line { font-size: 7.5pt; color: #94a3b8; margin-bottom: 1.5mm; line-height: 1.5; font-family: 'JetBrains Mono', monospace; }
  .side-contact-line a { color: #00d4ff; text-decoration: none; }

  .skill-bar { margin-bottom: 2.5mm; }
  .skill-name { font-family: 'JetBrains Mono', monospace; font-size: 7.5pt; color: #e0e0e0; margin-bottom: 0.8mm; }
  .skill-dots { display: flex; gap: 1mm; }
  .dot { width: 2.5mm; height: 2.5mm; border-radius: 50%; background: #1e3a4d; }
  .dot.filled { background: #00d4ff; }

  .cert-item { margin-bottom: 3mm; }
  .cert-name { font-family: 'JetBrains Mono', monospace; font-size: 8pt; color: #00d4ff; font-weight: 500; }
  .cert-meta { font-size: 7pt; color: #64748b; margin-top: 0.5mm; }

  /* Main */
  .main-headline { font-size: 12pt; font-weight: 700; color: #f8fafc; margin-bottom: 1mm; }
  .main-summary { font-size: 8.5pt; color: #94a3b8; line-height: 1.6; margin-bottom: 5mm; padding-left: 0; }

  .section { margin-bottom: 5mm; }
  .section-title { font-family: 'JetBrains Mono', monospace; font-size: 7.5pt; text-transform: uppercase; letter-spacing: 2px; color: #00d4ff; font-weight: 600; border-left: 2px solid #00d4ff; padding-left: 2mm; margin-bottom: 3mm; }

  .exp-item { margin-bottom: 4mm; padding-left: 2mm; border-left: 0.5mm solid #1e3a4d; }
  .exp-header { display: flex; justify-content: space-between; margin-bottom: 0.5mm; }
  .exp-company { font-family: 'JetBrains Mono', monospace; font-size: 10pt; font-weight: 600; color: #f8fafc; }
  .exp-dates { font-family: 'JetBrains Mono', monospace; font-size: 7.5pt; color: #00d4ff; }
  .exp-title { font-size: 8.5pt; color: #94a3b8; font-weight: 500; margin-bottom: 1.5mm; }
  .exp-bullets { padding-left: 4mm; }
  .exp-bullets li { font-size: 8pt; color: #cbd5e1; line-height: 1.5; margin-bottom: 1mm; list-style-type: '// '; }

  .edu-item { margin-bottom: 2.5mm; }
  .edu-school { font-family: 'JetBrains Mono', monospace; font-size: 9pt; font-weight: 600; color: #f8fafc; }
  .edu-degree { font-size: 8pt; color: #94a3b8; }
  .edu-dates { font-family: 'JetBrains Mono', monospace; font-size: 7.5pt; color: #64748b; }

  .proj-item { margin-bottom: 3mm; }
  .proj-name { font-family: 'JetBrains Mono', monospace; font-size: 9pt; font-weight: 600; color: #00d4ff; }
  .proj-stack { font-size: 7pt; color: #64748b; }
  .proj-desc { font-size: 8pt; color: #94a3b8; line-height: 1.5; margin-top: 1mm; }

  .ach-tag { display: inline-block; background: #1e3a4d; color: #00d4ff; font-family: 'JetBrains Mono', monospace; font-size: 7pt; padding: 0.8mm 2mm; margin: 0.5mm 1mm 0.5mm 0; }
</style>
</head>
<body>
<div class="page">
  <aside class="sidebar">
    <div class="side-name">{{NAME}}</div>
    <div class="side-headline">{{HEADLINE}}</div>

    <div class="side-section-title">// CONTACT</div>
    <div class="side-contact-line"><span style="color:#64748b">></span> {{EMAIL}}</div>
    <div class="side-contact-line"><span style="color:#64748b">></span> {{PHONE}}</div>
    <div class="side-contact-line"><span style="color:#64748b">></span> {{LOCATION}}</div>
    <div class="side-contact-line"><span style="color:#64748b">></span> {{LINKEDIN_DISPLAY}}</div>
    <div class="side-contact-line"><span style="color:#64748b">></span> {{GITHUB_DISPLAY}}</div>

    <div class="side-section-title">// SKILLS</div>
    {{SIDEBAR_SKILLS}}

    <div class="side-section-title">// CERTIFICATIONS</div>
    {{SIDEBAR_CERTS}}

    <div class="side-section-title">// ACHIEVEMENTS</div>
    {{SIDEBAR_ACHIEVEMENTS}}
  </aside>

  <main class="main">
    {{MAIN_CONTENT}}
  </main>
</div>
</body>
</html>
